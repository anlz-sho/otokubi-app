<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>お得日アシスタント</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF7F0;
  --card:#FFFFFF;
  --ink:#26211C;
  --sub:#8A8074;
  --line:#E9E2D5;
  --red:#D7263D;
  --red-soft:#FCEDEE;
  --green:#2E6E4E;
  --green-soft:#EAF3EE;
  --marker:#FFE066;
  --tabbar-h:62px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Hiragino Sans",system-ui,sans-serif;
  font-size:15px;
  line-height:1.55;
  overscroll-behavior-y:none;
}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:16px}

/* ---------- layout ---------- */
header.app{
  padding:calc(var(--safe-t) + 14px) 18px 10px;
  display:flex;align-items:baseline;justify-content:space-between;
}
header.app h1{font-size:19px;font-weight:800;letter-spacing:.02em}
header.app .date{font-size:12.5px;color:var(--sub);font-weight:700}
main{
  padding:0 14px calc(var(--tabbar-h) + var(--safe-b) + 24px);
  max-width:560px;margin:0 auto;
}
.page{display:none}
.page.active{display:block}
h2.sec{
  font-size:12.5px;color:var(--sub);font-weight:800;letter-spacing:.08em;
  margin:20px 4px 8px;
}

/* ---------- tab bar ---------- */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex;
  padding-bottom:var(--safe-b);
  height:calc(var(--tabbar-h) + var(--safe-b));
}
nav.tabs button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:10.5px;font-weight:700;color:var(--sub);height:var(--tabbar-h);
}
nav.tabs button .ic{font-size:21px;line-height:1}
nav.tabs button.on{color:var(--red)}
nav.tabs button .bdg{
  position:absolute;display:none;
}

/* ---------- cards ---------- */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px 16px;margin-bottom:10px;
}
.empty{
  text-align:center;color:var(--sub);font-size:13.5px;padding:26px 12px;
  border:1.5px dashed var(--line);border-radius:16px;margin-top:8px;
}

/* ---------- today banner ---------- */
.today{
  border:2px solid var(--red);border-radius:18px;background:var(--card);
  overflow:hidden;margin-bottom:12px;
}
.today .head{
  background:var(--red);color:#fff;padding:8px 16px;
  font-weight:800;font-size:13px;letter-spacing:.06em;
  display:flex;align-items:center;gap:8px;
}
.today .body{padding:14px 16px}
.today .store{font-size:19px;font-weight:800}
.today .camp{
  display:inline-block;margin-top:2px;font-weight:800;font-size:15px;
  background:linear-gradient(transparent 55%, var(--marker) 55%);
  padding:0 2px;
}
.today ul{list-style:none;margin-top:10px}
.today li{
  display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px dashed var(--line);
  font-weight:700;
}
.today li .dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex:none}
.today .none{margin-top:10px;color:var(--sub);font-size:13px}

/* ---------- upcoming deal cards ---------- */
.deal{
  display:flex;gap:14px;align-items:stretch;
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:12px 14px;margin-bottom:10px;
}
.deal .cal{
  flex:none;width:64px;border-radius:12px;overflow:hidden;text-align:center;
  border:1.5px solid var(--ink);background:#fff;align-self:flex-start;
}
.deal .cal .m{background:var(--ink);color:#fff;font-size:10.5px;font-weight:800;padding:2px 0;letter-spacing:.06em}
.deal .cal .d{font-size:26px;font-weight:800;line-height:1.15;padding-top:3px}
.deal .cal .w{font-size:10.5px;font-weight:800;color:var(--sub);padding-bottom:4px}
.deal .cal .w.sun{color:var(--red)}
.deal .cal .w.sat{color:#2A6FBF}
.deal .info{flex:1;min-width:0}
.deal .in{font-size:11px;color:var(--sub);font-weight:800}
.deal .store{font-size:16px;font-weight:800}
.deal .camp{color:var(--red);font-weight:800;font-size:13.5px}
.deal .items{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px}
.deal .items span{
  background:var(--red-soft);color:var(--red);font-size:12px;font-weight:800;
  border-radius:999px;padding:2.5px 10px;
}
.deal .noitem{margin-top:6px;font-size:12px;color:var(--sub)}

/* ---------- buy list ---------- */
.glabel{
  display:flex;align-items:center;gap:8px;margin:16px 4px 6px;
  font-size:13px;font-weight:800;
}
.glabel .tag{font-size:11px;color:var(--sub);font-weight:700}
.buyrow{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:7px;
}
.buyrow .chk{
  width:26px;height:26px;border-radius:9px;border:2px solid var(--line);flex:none;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800;
  transition:.12s;
}
.buyrow.on .chk{background:var(--red);border-color:var(--red)}
.buyrow .bd{flex:1;min-width:0}
.buyrow .nm{font-weight:700;font-size:15.5px}
.buyrow.on .nm{color:var(--red)}
.buyrow .stores{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.buyrow .stores span{
  background:var(--green-soft);color:var(--green);font-size:10.5px;font-weight:800;
  border-radius:999px;padding:1.5px 8px;
}
.buyrow .stores span.nostore{background:#F0EDE6;color:var(--sub)}
.buycount{
  display:flex;justify-content:space-between;align-items:center;margin:4px 4px 2px;
  font-size:13px;color:var(--sub);font-weight:700;
}
.buycount button{color:var(--red);font-weight:800;font-size:13px;padding:6px 8px}

/* ---------- items page ---------- */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chips button{
  background:var(--card);border:1.5px solid var(--line);border-radius:999px;
  padding:8px 14px;font-weight:700;font-size:14px;
}
.chips button:active{transform:scale(.95)}
.chips button.added{opacity:.35}
.addrow{display:flex;gap:8px;margin-top:10px}
.addrow input{
  flex:1;border:1.5px solid var(--line);border-radius:12px;padding:10px 14px;background:#fff;
  outline:none;min-width:0;
}
.addrow input:focus{border-color:var(--ink)}
.btn{
  background:var(--ink);color:#fff;font-weight:800;border-radius:12px;padding:10px 16px;font-size:14px;
}
.btn:active{transform:scale(.96)}
.btn.red{background:var(--red)}
.btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.itemrow{
  background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:10px 12px 11px;margin-bottom:7px;
}
.itemrow .toprow{display:flex;align-items:center;gap:10px}
.itemrow .nm{flex:1;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15.5px}
.itemrow .del{color:var(--sub);font-size:14px;padding:5px 10px;font-weight:800;border-radius:999px;border:1.5px solid var(--line)}
.del.armed,.edit.armed{background:var(--red) !important;border-color:var(--red) !important;color:#fff !important}
.storechips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.storechips button{
  border:1.5px solid var(--line);border-radius:999px;padding:4.5px 12px;
  font-size:12.5px;font-weight:800;color:var(--sub);background:#fff;
}
.storechips button.on{background:var(--green);border-color:var(--green);color:#fff}

/* ---------- stores page ---------- */
.storecard{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
.storecard .top{display:flex;align-items:center;gap:10px;padding:13px 16px}
.storecard .top .nm{flex:1;font-weight:800;font-size:16px}
.storecard .top .edit{color:var(--sub);font-weight:800;font-size:13px;padding:4px 6px}
.storecard .camps{padding:0 16px 12px}
.camprow{
  display:flex;align-items:center;gap:10px;border-top:1px dashed var(--line);padding:9px 0;
}
.camprow .days{flex:none;font-weight:800;color:var(--red);font-size:13.5px;min-width:86px}
.camprow .lb{flex:1;font-weight:700;font-size:13.5px}
.camprow .del{color:var(--sub);padding:4px 6px;font-size:15px}
.storeform{padding:0 16px 16px;border-top:1px solid var(--line)}
.storeform .f{margin-top:12px}
.storeform label{display:block;font-size:11.5px;color:var(--sub);font-weight:800;margin-bottom:6px;letter-spacing:.05em}
.storeform input{
  width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px 14px;background:#fff;outline:none;
}
.storeform input:focus{border-color:var(--ink)}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.daygrid button{
  aspect-ratio:1;border:1.5px solid var(--line);border-radius:9px;background:#fff;
  font-weight:800;font-size:13px;color:var(--ink);
}
.daygrid button.on{background:var(--red);border-color:var(--red);color:#fff}
.formbtns{display:flex;gap:8px;margin-top:14px}
.formbtns .btn{flex:1}
.danger{color:var(--red);font-weight:800;font-size:13px;text-align:center;width:100%;padding:12px 0 2px}

.fab-note{font-size:12px;color:var(--sub);margin:14px 6px 0;text-align:center}
.toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(8px);
  bottom:calc(var(--tabbar-h) + var(--safe-b) + 16px);
  background:var(--ink);color:#fff;font-weight:800;font-size:13.5px;
  padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;
  transition:.25s;z-index:99;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header class="app">
  <h1>お得日アシスタント</h1>
  <div class="date" id="todayLabel"></div>
</header>

<main>
  <!-- HOME -->
  <section class="page active" id="page-home">
    <div id="homeToday"></div>
    <h2 class="sec">次のお得日</h2>
    <div id="homeUpcoming"></div>
    <p class="fab-note">買う予定の商品は「買うもの」タブでチェックできます</p>
  </section>

  <!-- BUY LIST -->
  <section class="page" id="page-buy">
    <div class="buycount">
      <span id="buyCount"></span>
      <button onclick="clearWants()">すべて外す</button>
    </div>
    <div id="buyList"></div>
  </section>

  <!-- ITEMS -->
  <section class="page" id="page-items">
    <h2 class="sec">よく買うものから追加</h2>
    <div class="chips" id="presetChips"></div>
    <div class="addrow">
      <input id="newItemName" placeholder="商品名を入力" autocomplete="off">
      <button class="btn" onclick="addCustomItem()">追加</button>
    </div>
    <h2 class="sec">登録した商品</h2>
    <div id="itemList"></div>
  </section>

  <!-- STORES -->
  <section class="page" id="page-stores">
    <div id="storeList"></div>
    <button class="btn ghost" style="width:100%" onclick="openStoreForm(null)">＋ お店を追加</button>
  </section>
</main>

<nav class="tabs">
  <button id="tab-home" class="on" onclick="go('home')"><span class="ic">🏠</span>ホーム</button>
  <button id="tab-buy" onclick="go('buy')"><span class="ic">🛒</span>買うもの</button>
  <button id="tab-items" onclick="go('items')"><span class="ic">🧺</span>商品</button>
  <button id="tab-stores" onclick="go('stores')"><span class="ic">🏪</span>お店</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ================= data ================= */
const LS_KEY = "otokubi_v1";
const PRESETS = ["洗剤","歯磨き粉","ティッシュ","トイレットペーパー","レトルトご飯","飲料","お茶","冷凍食品","薬","サプリメント","シャンプー","卵","牛乳","パン","米","お菓子"];
const WD = ["日","月","火","水","木","金","土"];

let state = load();

function uid(){ return Math.random().toString(36).slice(2,9); }

function defaultState(){
  const s1 = uid(), s2 = uid(), s3 = uid();
  return {
    items: [
      {id:uid(), name:"レトルトご飯", storeIds:[s1], want:false},
      {id:uid(), name:"洗剤", storeIds:[s1], want:false},
      {id:uid(), name:"歯磨き粉", storeIds:[s2], want:false},
    ],
    stores: [
      {id:s1, name:"マックスバリュ", campaigns:[{id:uid(), days:[10,20,30], label:"お客様感謝デー 5%オフ"}]},
      {id:s2, name:"ドラッグイレブン", campaigns:[{id:uid(), days:[5,15,25], label:"ポイント5倍デー"}]},
      {id:s3, name:"ウエルシア", campaigns:[{id:uid(), days:[20], label:"ウエル活（WAON POINT 1.5倍）"}]},
    ]
  };
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const d = JSON.parse(raw);
      if(d && d.stores){
        /* migrate v1 single storeId -> storeIds array */
        for(const it of (d.items||[])){
          if(!Array.isArray(it.storeIds)){
            it.storeIds = it.storeId ? [it.storeId] : [];
            delete it.storeId;
          }
        }
        return d;
      }
    }
  }catch(e){}
  return defaultState();
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

function storeById(id){ return state.stores.find(s=>s.id===id) || null; }

/* ================= dates ================= */
function today0(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function fmtMD(d){ return (d.getMonth()+1)+"/"+d.getDate(); }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }

/* upcoming occurrences for all stores within `horizon` days */
function upcomingDeals(horizon){
  const t = today0();
  const out = [];
  for(const st of state.stores){
    for(const c of (st.campaigns||[])){
      for(const day of c.days){
        for(let k=0;k<3;k++){
          const y = t.getFullYear(), m = t.getMonth()+k;
          const yy = y + Math.floor(m/12), mm = m%12;
          if(day > daysInMonth(yy,mm)) continue;
          const d = new Date(yy,mm,day);
          const diff = Math.round((d - t)/86400000);
          if(diff>=0 && diff<=horizon){
            out.push({date:d, diff, store:st, camp:c});
          }
        }
      }
    }
  }
  out.sort((a,b)=> a.date-b.date || a.store.name.localeCompare(b.store.name));
  /* merge same store+date (multiple campaigns same day stay separate rows) */
  return out;
}

function wantItemsFor(storeId){
  return state.items.filter(i=>i.want && i.storeIds.includes(storeId));
}

/* ================= render: home ================= */
function renderHome(){
  const all = upcomingDeals(45);
  const todays = all.filter(d=>d.diff===0);
  const future = all.filter(d=>d.diff>0).slice(0,6);

  const elT = document.getElementById("homeToday");
  if(todays.length){
    elT.innerHTML = todays.map(d=>{
      const items = wantItemsFor(d.store.id);
      return `<div class="today">
        <div class="head">📣 今日はお得日！</div>
        <div class="body">
          <div class="store">${esc(d.store.name)}</div>
          <span class="camp">${esc(d.camp.label)}</span>
          ${items.length
            ? `<ul>${items.map(i=>`<li><span class="dot"></span>${esc(i.name)}</li>`).join("")}</ul>`
            : `<div class="none">買う予定の商品はありません</div>`}
        </div>
      </div>`;
    }).join("");
  }else{
    elT.innerHTML = "";
  }

  const elU = document.getElementById("homeUpcoming");
  if(!future.length){
    elU.innerHTML = `<div class="empty">直近のお得日はありません。<br>「お店」タブでお得日を登録しましょう</div>`;
    return;
  }
  elU.innerHTML = future.map(d=>{
    const items = wantItemsFor(d.store.id);
    const w = d.date.getDay();
    const inTxt = d.diff===1 ? "明日" : `${d.diff}日後`;
    return `<div class="deal">
      <div class="cal">
        <div class="m">${d.date.getMonth()+1}月</div>
        <div class="d">${d.date.getDate()}</div>
        <div class="w ${w===0?'sun':w===6?'sat':''}">${WD[w]}曜日</div>
      </div>
      <div class="info">
        <div class="in">${inTxt}</div>
        <div class="store">${esc(d.store.name)}</div>
        <div class="camp">${esc(d.camp.label)}</div>
        ${items.length
          ? `<div class="items">${items.map(i=>`<span>${esc(i.name)}</span>`).join("")}</div>`
          : `<div class="noitem">買う予定なし</div>`}
      </div>
    </div>`;
  }).join("");
}

/* ================= render: buy list ================= */
function renderBuy(){
  const el = document.getElementById("buyList");
  const cnt = state.items.filter(i=>i.want).length;
  document.getElementById("buyCount").textContent = cnt ? `買う予定：${cnt}品` : "チェックして買い物リストを作りましょう";

  if(!state.items.length){
    el.innerHTML = `<div class="empty">商品がまだありません。<br>「商品」タブから登録しましょう</div>`;
    return;
  }
  /* one row per item; linked stores shown as small tags */
  el.innerHTML = state.items.map(i=>{
    const stores = i.storeIds.map(id=>storeById(id)).filter(Boolean);
    const tags = stores.length
      ? stores.map(s=>`<span>${esc(s.name)}</span>`).join("")
      : `<span class="nostore">お店未設定</span>`;
    return `<div class="buyrow ${i.want?'on':''}" onclick="toggleWant('${i.id}')">
      <div class="chk">${i.want?'✓':''}</div>
      <div class="bd">
        <div class="nm">${esc(i.name)}</div>
        <div class="stores">${tags}</div>
      </div>
    </div>`;
  }).join("");
}
function toggleWant(id){
  const it = state.items.find(i=>i.id===id);
  if(it){ it.want = !it.want; save(); renderBuy(); renderHome(); }
}
function clearWants(){
  state.items.forEach(i=>i.want=false);
  save(); renderBuy(); renderHome();
}

/* ================= render: items ================= */
function renderItems(){
  const names = new Set(state.items.map(i=>i.name));
  document.getElementById("presetChips").innerHTML = PRESETS.map(p=>
    `<button class="${names.has(p)?'added':''}" onclick="addItem('${esc(p)}')">${esc(p)}</button>`
  ).join("");

  const el = document.getElementById("itemList");
  if(!state.items.length){
    el.innerHTML = `<div class="empty">上のボタンをタップして商品を追加</div>`;
    return;
  }
  el.innerHTML = state.items.map(i=>`
    <div class="itemrow">
      <div class="toprow">
        <div class="nm">${esc(i.name)}</div>
        <button class="del ${armed==='item:'+i.id?'armed':''}" onclick="delItem('${i.id}')">${armed==='item:'+i.id?'本当に削除？':'削除'}</button>
      </div>
      <div class="storechips">
        ${state.stores.map(s=>`
          <button class="${i.storeIds.includes(s.id)?'on':''}"
            onclick="toggleItemStore('${i.id}','${s.id}')">${esc(s.name)}</button>`).join("")}
      </div>
    </div>`).join("");
}
function addItem(name){
  name = name.trim();
  if(!name) return;
  if(state.items.some(i=>i.name===name)){ toast("すでに登録されています"); return; }
  state.items.unshift({id:uid(), name, storeIds: state.stores[0]?[state.stores[0].id]:[], want:false});
  save(); renderItems(); renderBuy(); renderHome();
  toast(`「${name}」を追加しました`);
}
function addCustomItem(){
  const inp = document.getElementById("newItemName");
  addItem(inp.value);
  inp.value = "";
}
function toggleItemStore(id, sid){
  const it = state.items.find(i=>i.id===id);
  if(!it) return;
  const k = it.storeIds.indexOf(sid);
  if(k>=0) it.storeIds.splice(k,1); else it.storeIds.push(sid);
  save(); renderItems(); renderBuy(); renderHome();
}
function delItem(id){
  if(!confirmTwice('item:'+id, renderItems)) return;
  state.items = state.items.filter(i=>i.id!==id);
  save(); renderItems(); renderBuy(); renderHome();
  toast("削除しました");
}

/* ================= render: stores ================= */
let editingStoreId = undefined; /* undefined=closed, null=new, id=editing */
let formDays = [], formName = "", formLabel = "";

function renderStores(){
  const el = document.getElementById("storeList");
  let html = state.stores.map(st=>{
    const camps = (st.campaigns||[]).map(c=>`
      <div class="camprow">
        <div class="days">毎月 ${c.days.join("・")}日</div>
        <div class="lb">${esc(c.label)}</div>
        <button class="del ${armed==='camp:'+c.id?'armed':''}" onclick="delCamp('${st.id}','${c.id}')">${armed==='camp:'+c.id?'本当に？':'✕'}</button>
      </div>`).join("");
    return `<div class="storecard">
      <div class="top">
        <div class="nm">${esc(st.name)}</div>
        <button class="edit" onclick="openStoreForm('${st.id}')">＋ お得日</button>
        <button class="edit ${armed==='store:'+st.id?'armed':''}" style="color:var(--red);padding:4px 10px;border-radius:999px"
          onclick="delStore('${st.id}')">${armed==='store:'+st.id?'本当に削除？':'削除'}</button>
      </div>
      <div class="camps">${camps || `<div class="camprow"><div class="lb" style="color:var(--sub)">お得日が未登録です</div></div>`}</div>
      ${editingStoreId===st.id ? storeFormHTML(st) : ""}
    </div>`;
  }).join("");
  if(editingStoreId===null){
    html += `<div class="storecard">${storeFormHTML(null)}</div>`;
  }
  el.innerHTML = html;
}

function storeFormHTML(st){
  const days7 = [];
  for(let r=0;r<5;r++){
    let row = "";
    for(let c=1;c<=7;c++){
      const d = r*7+c;
      if(d>31) break;
      row += `<button class="${formDays.includes(d)?'on':''}" onclick="toggleFormDay(${d})">${d}</button>`;
    }
    days7.push(row);
  }
  return `<div class="storeform">
    ${st===null ? `<div class="f"><label>お店の名前</label><input id="fStoreName" placeholder="例：マックスバリュ" value="${esc(formName)}" oninput="formName=this.value"></div>` : ""}
    <div class="f"><label>キャンペーン内容</label><input id="fCampLabel" placeholder="例：5%オフ / ポイント5倍" value="${esc(formLabel)}" oninput="formLabel=this.value"></div>
    <div class="f"><label>毎月のお得日（タップで選択）</label>
      <div class="daygrid">${days7.join("")}</div>
    </div>
    <div class="formbtns">
      <button class="btn ghost" onclick="closeStoreForm()">キャンセル</button>
      <button class="btn red" onclick="saveStoreForm(${st?`'${st.id}'`:"null"})">保存</button>
    </div>
  </div>`;
}
function openStoreForm(id){
  editingStoreId = id;
  formDays = []; formName = ""; formLabel = "";
  renderStores();
  setTimeout(()=>{
    const el = document.getElementById(id===null ? "fStoreName" : "fCampLabel");
    if(el) el.scrollIntoView({block:"center", behavior:"smooth"});
  },50);
}
function closeStoreForm(){ editingStoreId = undefined; renderStores(); }
function toggleFormDay(d){
  const i = formDays.indexOf(d);
  if(i>=0) formDays.splice(i,1); else formDays.push(d);
  formDays.sort((a,b)=>a-b);
  renderStores();
}
function saveStoreForm(storeId){
  const label = formLabel.trim();
  if(storeId===null){
    const name = formName.trim();
    if(!name){ toast("お店の名前を入力してください"); return; }
    const st = {id:uid(), name, campaigns:[]};
    if(label && formDays.length) st.campaigns.push({id:uid(), days:[...formDays], label});
    state.stores.push(st);
  }else{
    if(!label){ toast("キャンペーン内容を入力してください"); return; }
    if(!formDays.length){ toast("お得日を選択してください"); return; }
    const st = storeById(storeId);
    if(st) st.campaigns.push({id:uid(), days:[...formDays], label});
  }
  editingStoreId = undefined;
  save(); renderStores(); renderHome(); renderItems(); renderBuy();
  toast("保存しました");
}
function delCamp(storeId, campId){
  if(!confirmTwice('camp:'+campId, renderStores)) return;
  const st = storeById(storeId);
  if(!st) return;
  st.campaigns = st.campaigns.filter(c=>c.id!==campId);
  save(); renderStores(); renderHome();
  toast("削除しました");
}
function delStore(id){
  if(!confirmTwice('store:'+id, renderStores)) return;
  state.stores = state.stores.filter(s=>s.id!==id);
  state.items.forEach(i=>{ i.storeIds = i.storeIds.filter(sid=>sid!==id); });
  save(); renderStores(); renderHome(); renderItems(); renderBuy();
  toast("削除しました");
}

/* ================= misc ================= */
/* two-step delete: first tap arms the button, second tap (within 3s) confirms */
let armed = null, armedTimer = null;
function confirmTwice(key, rerender){
  if(armed === key){
    armed = null; clearTimeout(armedTimer);
    return true;
  }
  armed = key;
  clearTimeout(armedTimer);
  armedTimer = setTimeout(()=>{ armed = null; rerender(); }, 3000);
  rerender();
  return false;
}
function go(p){
  document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.remove("on"));
  document.getElementById("tab-"+p).classList.add("on");
  window.scrollTo(0,0);
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 1800);
}

/* ================= init ================= */
(function init(){
  const t = new Date();
  document.getElementById("todayLabel").textContent =
    `${t.getMonth()+1}月${t.getDate()}日（${WD[t.getDay()]}）`;
  renderHome(); renderBuy(); renderItems(); renderStores();
})();
</script>
</body>
</html>
